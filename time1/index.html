<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지뢰찾기</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 16px;
      letter-spacing: 2px;
      color: #e94560;
    }

    #controls {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    select, button {
      padding: 8px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
    }

    select {
      background: #16213e;
      color: #eee;
      border: 1px solid #e94560;
    }

    button {
      background: #e94560;
      color: #fff;
      font-weight: bold;
      transition: background 0.2s;
    }

    button:hover { background: #c73652; }

    #info {
      display: flex;
      gap: 30px;
      margin-bottom: 14px;
      font-size: 1.1rem;
    }

    .info-box {
      background: #16213e;
      padding: 8px 18px;
      border-radius: 8px;
      border: 1px solid #0f3460;
      text-align: center;
    }

    .info-box span { display: block; font-size: 1.4rem; font-weight: bold; color: #e94560; }

    #board {
      display: inline-grid;
      gap: 2px;
      background: #0f3460;
      padding: 8px;
      border-radius: 10px;
      border: 2px solid #e94560;
    }

    .cell {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.85rem;
      border-radius: 4px;
      cursor: pointer;
      user-select: none;
      transition: background 0.1s;
    }

    .cell.hidden {
      background: #16213e;
      border: 1px solid #0f3460;
    }

    .cell.hidden:hover { background: #1e3a5f; }

    .cell.flagged {
      background: #16213e;
      border: 1px solid #0f3460;
    }

    .cell.revealed {
      background: #0a1628;
      border: 1px solid #0a1628;
      cursor: default;
    }

    .cell.mine-hit { background: #e94560 !important; }
    .cell.mine-show { background: #1a1a2e; color: #e94560; }

    .n1 { color: #4fc3f7; }
    .n2 { color: #81c784; }
    .n3 { color: #ef5350; }
    .n4 { color: #9c27b0; }
    .n5 { color: #ff7043; }
    .n6 { color: #26c6da; }
    .n7 { color: #ec407a; }
    .n8 { color: #bdbdbd; }

    #message {
      margin-top: 14px;
      font-size: 1.3rem;
      font-weight: bold;
      min-height: 32px;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <h1>💣 지뢰찾기</h1>

  <div id="controls">
    <select id="difficulty">
      <option value="easy">쉬움 (9×9, 지뢰 10)</option>
      <option value="medium" selected>보통 (16×16, 지뢰 40)</option>
      <option value="hard">어려움 (30×16, 지뢰 99)</option>
    </select>
    <button onclick="startGame()">새 게임</button>
  </div>

  <div id="info">
    <div class="info-box">🚩 남은 지뢰<span id="mine-count">0</span></div>
    <div class="info-box">⏱ 시간<span id="timer">0</span></div>
  </div>

  <div id="board"></div>
  <div id="message"></div>

  <script>
    const CONFIGS = {
      easy:   { rows: 9,  cols: 9,  mines: 10 },
      medium: { rows: 16, cols: 16, mines: 40 },
      hard:   { rows: 16, cols: 30, mines: 99 },
    };

    let rows, cols, totalMines;
    let board, revealed, flagged, mineSet;
    let gameOver, firstClick, timerInterval, seconds, flagCount;

    function startGame() {
      const cfg = CONFIGS[document.getElementById('difficulty').value];
      rows = cfg.rows; cols = cfg.cols; totalMines = cfg.mines;

      board    = Array.from({length: rows}, () => Array(cols).fill(0));
      revealed = Array.from({length: rows}, () => Array(cols).fill(false));
      flagged  = Array.from({length: rows}, () => Array(cols).fill(false));
      mineSet  = new Set();
      gameOver = false;
      firstClick = true;
      flagCount = 0;
      seconds = 0;

      clearInterval(timerInterval);
      document.getElementById('timer').textContent = '0';
      document.getElementById('mine-count').textContent = totalMines;
      document.getElementById('message').textContent = '';

      renderBoard();
    }

    function placeMines(safeR, safeC) {
      const safe = new Set();
      for (let dr = -1; dr <= 1; dr++)
        for (let dc = -1; dc <= 1; dc++) {
          const nr = safeR + dr, nc = safeC + dc;
          if (nr >= 0 && nr < rows && nc >= 0 && nc < cols)
            safe.add(nr * cols + nc);
        }

      while (mineSet.size < totalMines) {
        const idx = Math.floor(Math.random() * rows * cols);
        if (!safe.has(idx)) mineSet.add(idx);
      }

      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if (!mineSet.has(r * cols + c)) {
            let count = 0;
            for (let dr = -1; dr <= 1; dr++)
              for (let dc = -1; dc <= 1; dc++) {
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && mineSet.has(nr * cols + nc))
                  count++;
              }
            board[r][c] = count;
          } else {
            board[r][c] = -1;
          }
    }

    function renderBoard() {
      const el = document.getElementById('board');
      el.style.gridTemplateColumns = `repeat(${cols}, 32px)`;
      el.innerHTML = '';

      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell hidden';
          cell.dataset.r = r;
          cell.dataset.c = c;
          cell.addEventListener('click', onLeft);
          cell.addEventListener('contextmenu', onRight);
          el.appendChild(cell);
        }
    }

    function getCellEl(r, c) {
      return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
    }

    function onLeft(e) {
      if (gameOver) return;
      const r = +this.dataset.r, c = +this.dataset.c;
      if (flagged[r][c]) return;

      if (firstClick) {
        firstClick = false;
        placeMines(r, c);
        timerInterval = setInterval(() => {
          seconds++;
          document.getElementById('timer').textContent = seconds;
        }, 1000);
      }

      reveal(r, c);
      checkWin();
    }

    function onRight(e) {
      e.preventDefault();
      if (gameOver) return;
      const r = +this.dataset.r, c = +this.dataset.c;
      if (revealed[r][c]) return;

      flagged[r][c] = !flagged[r][c];
      flagCount += flagged[r][c] ? 1 : -1;
      document.getElementById('mine-count').textContent = totalMines - flagCount;

      const cell = getCellEl(r, c);
      if (flagged[r][c]) {
        cell.classList.add('flagged');
        cell.textContent = '🚩';
      } else {
        cell.classList.remove('flagged');
        cell.textContent = '';
      }
    }

    function reveal(r, c) {
      if (r < 0 || r >= rows || c < 0 || c >= cols) return;
      if (revealed[r][c] || flagged[r][c]) return;

      revealed[r][c] = true;
      const cell = getCellEl(r, c);

      if (board[r][c] === -1) {
        cell.classList.replace('hidden', 'mine-hit');
        cell.textContent = '💣';
        endGame(false);
        return;
      }

      cell.classList.replace('hidden', 'revealed');
      if (board[r][c] > 0) {
        cell.textContent = board[r][c];
        cell.classList.add(`n${board[r][c]}`);
      } else {
        for (let dr = -1; dr <= 1; dr++)
          for (let dc = -1; dc <= 1; dc++)
            reveal(r + dr, c + dc);
      }
    }

    function checkWin() {
      let unrevealed = 0;
      for (let r = 0; r < rows; r++)
        for (let c = 0; c < cols; c++)
          if (!revealed[r][c]) unrevealed++;

      if (unrevealed === totalMines) endGame(true);
    }

    function endGame(win) {
      gameOver = true;
      clearInterval(timerInterval);

      if (!win) {
        mineSet.forEach(idx => {
          const r = Math.floor(idx / cols), c = idx % cols;
          if (!revealed[r][c]) {
            const cell = getCellEl(r, c);
            cell.classList.replace('hidden', 'mine-show');
            cell.textContent = '💣';
          }
        });
        document.getElementById('message').textContent = '💥 게임 오버!';
      } else {
        document.getElementById('message').textContent = `🎉 성공! ${seconds}초`;
      }
    }

    startGame();
  </script>
</body>
</html>
